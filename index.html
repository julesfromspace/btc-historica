<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BTC HISTORICA</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
</head>

<body class="sidepanel-open">
  <div id="container">
    <header id="header">
      <div class="brand">
        <span class="dot"></span>
        <span class="title">BTC HISTORICA</span>
      </div>
    </header>

    <button id="btn-sidepanel" class="icon-btn-tl toggle-btn" aria-label="Toggle sidepanel" type="button">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"
        stroke-linejoin="round">
        <rect x="3" y="5" width="18" height="14" rx="1" />
        <line x1="9" y1="5" x2="9" y2="19" />
      </svg>
    </button>

    <aside id="sidepanel" class="sidepanel open" aria-hidden="false">
      <div class="sidepanel-header">
        <span class="sidepanel-title">Community suggestions</span>
        <button id="btn-sidepanel-close" class="sidepanel-close" aria-label="Close sidepanel" type="button">×</button>
      </div>
      <div id="suggestion-list-wrap" class="suggestion-list-wrap">
        <ul id="suggestion-list" class="suggestion-list"></ul>
        <div id="suggestion-empty" class="empty-state">No suggestions yet.<br />Add one below.</div>
      </div>
      <form id="suggest-form" class="suggest-form" autocomplete="off">
        <textarea id="suggest-input" class="suggest-input" maxlength="140"
          placeholder="Suggest a new event…" rows="1"></textarea>
        <button id="suggest-submit" class="suggest-submit" type="submit">Add</button>
      </form>
    </aside>

    <div id="chart-toggle" class="chart-toggle">
      <button id="btn-candles" class="toggle-btn" aria-label="Candlestick chart" type="button">
        <svg viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="1.6" stroke-linecap="round">
          <line x1="7" y1="3" x2="7" y2="21" />
          <rect x="5" y="7" width="4" height="10" />
          <line x1="17" y1="3" x2="17" y2="21" />
          <rect x="15" y="10" width="4" height="8" fill="none" />
        </svg>
      </button>
      <button id="btn-line" class="toggle-btn selected" aria-label="Line chart" type="button">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"
          stroke-linejoin="round">
          <polyline points="3,17 9,11 13,14 21,5" />
        </svg>
      </button>
    </div>

    <div id="hint" class="hint-overlay">Hover the chart to explore <br> Bitcoin's history</div>

    <div id="chart-wrap">
      <div id="chart"></div>
      <div id="event-dots"></div>
      <div id="hover-h-line" class="hidden"></div>
      <div id="price-label" class="hidden"></div>
      <div id="date-label" class="hidden"></div>
      <div id="event-overlay" class="hidden">
        <div class="event-title" id="event-title"></div>
      </div>
    </div>

  </div>

  <script src="data.js"></script>
  <script src="main.js"></script>
</body>

</html>
